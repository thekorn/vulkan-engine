name: build test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  # Cancels pending runs when a PR gets updated.
  group: ${{ github.head_ref || github.run_id }}-${{ github.actor }}
  cancel-in-progress: true
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # os: [macos-latest, ubuntu-latest]
        os: [ubuntu-latest]
    runs-on: ${{matrix.os}}
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # Install Nix and use that to run our tests so our environment matches exactly.
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Run our checks to catch quick issues
      - run: nix flake check

      - name: spellcheck
        run: nix develop -c codebook-lsp lint .

      - name: lint (zlint)
        run: nix develop -c zlint

      - name: build & test
        run: nix develop -c zig build test --summary all

      - name: coverage (kcov)
        run: nix develop -c zig build coverage --summary all

      - name: upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: zig-out/cover
          if-no-files-found: ignore

      # On pushes to main, publish the coverage.json so PRs can diff
      # against the latest mainline coverage numbers. kcov maintains a
      # stable `test` symlink to the latest per-run output.
      - name: upload baseline coverage (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-main
          path: zig-out/cover/test/coverage.json
          if-no-files-found: error

      # On PRs, pull down the latest main baseline (best-effort) and
      # post a sticky comment with the current coverage + delta.
      - name: download baseline coverage (PRs)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: coverage-main
          workflow: ci.yaml
          branch: main
          event: push
          path: baseline
          if_no_artifact_found: warn

      - name: post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const current = JSON.parse(
              fs.readFileSync('zig-out/cover/test/coverage.json', 'utf8'),
            );

            let baseline = null;
            try {
              baseline = JSON.parse(
                fs.readFileSync('baseline/coverage.json', 'utf8'),
              );
            } catch (e) {
              core.warning(
                'no baseline coverage available; reporting current numbers only',
              );
            }

            const stripPath = (p) => p.replace(/^.*\/src\//, '');
            const fmtPct = (s) => Number(s).toFixed(2);
            const fmtDelta = (cur, base) => {
              if (base == null) return 'n/a';
              const d = Number(cur) - Number(base);
              if (Math.abs(d) < 0.005) return '±0.00%';
              const sign = d > 0 ? '+' : '';
              return `${sign}${d.toFixed(2)}%`;
            };

            const baseByFile = baseline
              ? Object.fromEntries(
                  baseline.files.map((f) => [stripPath(f.file), f]),
                )
              : {};

            const overallDelta = baseline
              ? fmtDelta(current.percent_covered, baseline.percent_covered)
              : 'n/a';

            const rows = current.files
              .map((f) => ({
                name: stripPath(f.file),
                pct: f.percent_covered,
                cov: f.covered_lines,
                tot: f.total_lines,
              }))
              .sort((a, b) => Number(a.pct) - Number(b.pct))
              .map(
                (f) =>
                  `| \`${f.name}\` | ${fmtPct(f.pct)}% | ${fmtDelta(
                    f.pct,
                    baseByFile[f.name]?.percent_covered,
                  )} | ${f.cov}/${f.tot} |`,
              )
              .join('\n');

            const marker = '<!-- coverage-comment -->';
            const body = [
              marker,
              '## 📊 Code Coverage Report',
              '',
              `**Overall:** ${fmtPct(current.percent_covered)}% ` +
                `(${current.covered_lines}/${current.total_lines} lines) ` +
                `— Δ vs \`main\`: **${overallDelta}**`,
              '',
              '<details>',
              '<summary>Per-file coverage</summary>',
              '',
              '| File | Coverage | Δ vs main | Lines |',
              '| --- | ---: | ---: | ---: |',
              rows,
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

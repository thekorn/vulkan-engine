ignore_paths = [
    "flake.lock",
    "models/**/*",
    # Vendored third-party packages fetched by `zig fetch` into the
    # local `zig-pkg/` directory (Zig 0.16+ behavior). Spell-checking
    # cimgui / Dear ImGui source would dwarf the project's own
    # findings and we don't own those words.
    "zig-pkg/**",
    # `build.zig.zon` contains base64-style package hashes that the
    # spell checker trips over (random chunks of letters and digits).
    # The file is auto-generated by `zig fetch --save`, so skipping it
    # doesn't cost us coverage.
    "build.zig.zon",
]
